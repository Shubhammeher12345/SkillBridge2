<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - SkillBridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Poppins',sans-serif;background-color:#121212;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
        .flash-messages{position:fixed;top:20px;right:20px;z-index:1001;display:flex;flex-direction:column;gap:10px}
        .flash-banner{padding:1rem 1.5rem;border-radius:8px;color:#fff;font-weight:600;box-shadow:0 4px 15px rgba(0,0,0,.2);opacity:0;transform:translateX(100%);animation:slideIn .5s forwards}
        @keyframes slideIn{to{opacity:1;transform:translateX(0)}}
        .flash-error{background-color:#dc3545}
        .form-container{background-color:#1e1e1e;padding:2.5rem;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.5);width:100%;max-width:400px;text-align:center}
        .form-container h2{margin-top:0;margin-bottom:.5rem;font-size:2em}
        .form-container input{width:100%;padding:12px 15px;margin-bottom:1rem;border:1px solid #444;border-radius:8px;background-color:#2a2a2a;color:#fff;font-size:1em;box-sizing:border-box}
        .cta-button{width:100%;background:linear-gradient(90deg,#4F46E5,#818CF8);color:#fff;padding:12px 24px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:1.1em}
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash-banner flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <div class="form-container">
        <form action="{{ url_for('reset_password', token=token) }}" method="POST">
            <h2>Create a New Password</h2>
            <input type="password" name="password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit" class="cta-button">Update Password</button>
        </form>
    </div>
</body>
</html>
